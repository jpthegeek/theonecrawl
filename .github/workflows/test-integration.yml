name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @theonecrawl/api build

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: api

      - name: Start API server
        run: |
          node dist/index.js &
          echo $! > /tmp/api.pid
        working-directory: api
        env:
          PORT: "3001"
          HOST: "0.0.0.0"
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: test-secret-for-ci
          OPS_CENTER_TOKEN: test-ops-token

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Run integration tests
        run: |
          # Health check
          echo "=== Health Check ==="
          curl -sf http://localhost:3001/health | jq .
          curl -sf http://localhost:3001/api/health | jq .

          # Metrics endpoint (requires auth)
          echo "=== Metrics (should 401 without token) ==="
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/api/metrics)
          [ "$STATUS" = "401" ] && echo "PASS: 401 without auth" || echo "FAIL: expected 401, got $STATUS"

          echo "=== Metrics (with token) ==="
          curl -sf -H "Authorization: Bearer test-ops-token" http://localhost:3001/api/metrics | jq .

          echo "=== All integration tests passed ==="

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill $(cat /tmp/api.pid) 2>/dev/null || true
          fi
