rules:
  - id: hardcoded-api-key
    pattern-either:
      - pattern: |
          $VAR = "sk_live_..."
      - pattern: |
          $VAR = "sk_test_..."
      - pattern: |
          $VAR = "pk_live_..."
      - pattern: |
          $VAR = "AKIA..."
      - pattern: |
          $VAR = "ghp_..."
      - pattern: |
          $VAR = "ghs_..."
      - pattern: |
          $VAR = "github_pat_..."
    message: >
      Hardcoded API key or secret detected. Store secrets in Azure Key Vault and access via
      environment variables or managed identity.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      subcategory: secrets
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"

  - id: hardcoded-connection-string
    pattern-regex: "(AccountEndpoint|AccountKey|SharedAccessKey|DefaultEndpointsProtocol)=[^;\"'\\s]+"
    paths:
      exclude:
        - "*.test.*"
        - "*.spec.*"
        - "*.md"
    message: >
      Hardcoded connection string detected. Use environment variables or Key Vault references.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      subcategory: secrets
      cwe: "CWE-798: Use of Hard-coded Credentials"

  - id: hardcoded-jwt-secret
    patterns:
      - pattern-either:
          - pattern: |
              jwt.sign($PAYLOAD, "...")
          - pattern: |
              jwt.verify($TOKEN, "...")
    message: >
      JWT signed/verified with a hardcoded secret. Use environment variables or Key Vault
      for JWT signing keys.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      subcategory: secrets
      cwe: "CWE-798: Use of Hard-coded Credentials"
